name: household_manager
description: Home management app

publish_to: 'none'
version: 1.0.0+1

# Use Flutter 3.24 !!
# Other version of Flutter caused problem so please use this version
# In 3.13 version refreshing of widgets is not working properly and in
# 3.27 version there is a problem with text fields.

environment:
  sdk: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter

  intl: ^0.18.0
  json_annotation: ^4.9.0
  json_serializable: ^6.9.0
  provider: ^6.0.5
  get_it: ^8.0.3
  firebase_core: ^3.10.0
  firebase_auth: ^5.4.0
  cloud_firestore: ^5.6.1
  firebase_storage: ^12.4.0
  cr_calendar: ^1.2.1
  flutter_modular: ^5.0.0
  flutter_svg: ^2.0.17
  rxdart: ^0.28.0
  easy_loading_button: ^0.3.2
  image_picker: ^1.1.2
  fl_chart: ^0.67.0
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.4.11

flutter:
  uses-material-design: true

  assets:
    - assets/icons/logo.svg
